# .github/workflows/ci.yml
name: Frontend CI

on:
  push:
    branches-ignore:
      - develop
  pull_request:
    branches-ignore:
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Type-Check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: npx vite build