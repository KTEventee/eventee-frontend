name: Frontend CI

on: 
  push:
    branches:
      - '*'
      - '!develop'

  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with: 
          node-version: 20
      
      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
